name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build ${{ matrix.npm_platform }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            npm_platform: linux-x64
            ext: ''
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            npm_platform: linux-arm64
            ext: ''
          - os: macos-latest
            target: x86_64-apple-darwin
            npm_platform: darwin-x64
            ext: ''
          - os: macos-14
            target: aarch64-apple-darwin
            npm_platform: darwin-arm64
            ext: ''
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            npm_platform: win32-x64
            ext: '.exe'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libusb-1.0-0-dev libudev-dev

      - name: Install cross-compilation dependencies (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo dpkg --add-architecture arm64
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            libudev-dev:arm64 \
            libusb-1.0-0-dev:arm64
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig" >> $GITHUB_ENV
          echo "PKG_CONFIG_SYSROOT_DIR=/" >> $GITHUB_ENV
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Copy binary to npm package
        shell: bash
        run: |
          mkdir -p packages/${{ matrix.npm_platform }}/bin
          cp target/${{ matrix.target }}/release/embedded-xLink-mcp${{ matrix.ext }} \
             packages/${{ matrix.npm_platform }}/bin/embedded-xLink-mcp${{ matrix.ext }}

      - name: Set executable permission (Unix only)
        if: runner.os != 'Windows'
        run: chmod 755 packages/${{ matrix.npm_platform }}/bin/embedded-xLink-mcp

      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.npm_platform }}
          path: packages/${{ matrix.npm_platform }}/bin/

  publish-npm:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Download all platform binaries
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: artifacts
          merge-multiple: true

      - name: Organize binaries into package directories
        shell: bash
        run: |
          for artifact_dir in artifacts/*/; do
            platform_name=$(basename "$artifact_dir")
            if [ -d "$artifact_dir" ]; then
              mkdir -p "packages/$platform_name/bin"
              cp "$artifact_dir"/* "packages/$platform_name/bin/"
            fi
          done

      - name: Publish platform packages
        shell: bash
        run: |
          for pkg in darwin-x64 darwin-arm64 linux-x64 linux-arm64 win32-x64; do
            echo "--- Publishing @vividcodeai/embedded-xlink-$pkg ---"
            cd packages/$pkg
            npm publish --access public || echo "Package $pkg may already exist"
            cd ../..
          done

      - name: Publish CLI package
        run: |
          cd packages/cli
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  create-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: release-artifacts
          merge-multiple: true

      - name: Rename binaries for release
        shell: bash
        run: |
          mkdir -p release-files
          for f in release-artifacts/*/bin/* release-artifacts/bin/*; do
            [ -f "$f" ] || continue
            dir_name=$(basename "$(dirname "$(dirname "$f")")" 2>/dev/null || echo "unknown")
            ext=""
            case "$f" in
              *.exe) ext=".exe" ;;
            esac
            cp "$f" "release-files/embedded-xLink-mcp-$dir_name$ext"
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          draft: false
          prerelease: false
          generate_release_notes: true
